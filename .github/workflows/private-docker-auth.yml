name: private-docker-auth

# Demonstrates the three ways a GitHub-hosted runner interacts with a PRIVATE
# container image (hosted in GHCR), and proves WHEN each image is pulled
# relative to the login.
#
# Image under test: ghcr.io/dattathallam/compliance-check:1.0
#   (build+push it first with the publish-test-image workflow; keep the package Private)
#
# Auth uses the built-in GITHUB_TOKEN — no external secrets needed. The token
# needs packages: read (declared below) and the package must be linked to this repo.
#
# Expected outcomes:
#   job-a  ❌ FAILS at "Set up job" — the runner pulls the docker:// step-action
#            image during the PREPARE phase (anonymously, before the login step),
#            so a private image gives 401 and the job never reaches step 1.
#            (continue-on-error keeps the workflow going so you can see b and c.)
#   job-b  ✅ PASSES — login is a step, and the pull happens later inside a
#            run: step (docker run), so ordering is under your control.
#   job-c  ✅ PASSES — the private image is a job container; the prepare-phase
#            pull is authenticated by the in-YAML credentials: block.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  # NOTE: `uses:` does NOT support ${{ }} expressions, so job-a hardcodes the
  # full image reference. Keep this env in sync with that literal.
  IMAGE: ghcr.io/dattathallam/compliance-check:1.0

jobs:
  # ---------------------------------------------------------------------------
  # A) login STEP before a private docker:// action STEP.
  #    The tempting-but-broken pattern. The image is pulled during the prepare
  #    phase (before any step runs), anonymously, so the login step is too late
  #    and the job fails during "Set up job" with a 401/unauthorized.
  # ---------------------------------------------------------------------------
  job-a-login-step-then-action:
    name: "A: login step then docker:// action (expected to FAIL)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL}}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '30' }}
          fail_on_violation: 'true'
      - name: Log in to GHCR (runs AFTER the prepare-phase pull — too late)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Prepare phase already tried (and failed) to pull this before step 1.
      - name: Run private image as a step action
        uses: docker://ghcr.io/dattathallam/compliance-check:1.0
        with:
          args: hello-from-job-a

  # ---------------------------------------------------------------------------
  # B) Manual login + docker run inside a run: step.
  #    The reliable "lazy" path: you own the ordering, so the pull happens after
  #    the login, at step-execution time.
  # ---------------------------------------------------------------------------
  job-b-manual-login-then-run:
    name: "B: manual login + docker run (expected to PASS)"
    runs-on: ubuntu-latest
    steps:
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL}}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '30' }}
          fail_on_violation: 'true'
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull + run the private image ourselves
        run: |
          echo "Pulling and running $IMAGE via docker run (host creds already set)..."
          docker run --rm "$IMAGE" hello-from-job-b

  # ---------------------------------------------------------------------------
  # C) Private image as the JOB CONTAINER, authenticated via credentials:.
  #    The prepare phase pulls it using the in-YAML credentials, then every step
  #    runs INSIDE the private image. This is the in-YAML mechanism that a login
  #    step cannot replace.
  # ---------------------------------------------------------------------------
  job-c-container-credentials:
    name: "C: job container with credentials (expected to PASS)"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dattathallam/compliance-check:1.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL}}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '30' }}
          fail_on_violation: 'true'
      - name: Prove we are inside the private image
        run: |
          echo "This step runs inside the private container image."
          echo "alpine-release: $(cat /etc/alpine-release)"
