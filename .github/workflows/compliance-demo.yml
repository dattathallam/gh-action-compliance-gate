name: Compliance Demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      compliance_server_url:
        description: 'Compliance mock server URL'
        required: false
        default: 'https://2f25-167-103-78-117.ngrok-free.app'
      min_age_days:
        description: >
          Minimum version age in days. Raise this (e.g. 30, 60) to see more
          actions replaced with older compliant versions.
        required: false
        default: '30'

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      # ── Compliance gate (runs first — can abort before any work executes) ──
      # The runner pre-downloads ALL actions referenced in this workflow into
      # _work/_actions before any step runs, so the compliance check sees every
      # action that will be used even though it runs first.
      #
      # Actions evaluated (covering floating-tag, branch, and specific-tag refs):
      #   actions/checkout              → v4      (floating tag, node)
      #   actions/setup-node            → v4      (floating tag, node)
      #   actions/cache                 → v4      (floating tag, node)
      #   tj-actions/changed-files      → v47     (floating tag, node — frequent releases)
      #   softprops/action-gh-release   → v3      (floating tag, node)
      #   dattathallam/gh-action-composite → v1   (floating tag, composite)
      #   dattathallam/gh-action-node   → main    (branch)
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL || 'https://2f25-167-103-78-117.ngrok-free.app' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '30' }}
          fail_on_violation: 'true'

      # ── Real work ─────────────────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          since_last_remote_commit: true

      - name: List changed files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed.outputs.all_changed_files }}"

      # Included so the runner pre-downloads it for compliance evaluation.
      # The step itself is skipped at runtime (condition never true).
      - name: Publish release (compliance reference only)
        uses: softprops/action-gh-release@v3
        if: false
        with:
          tag_name: demo-${{ github.run_number }}

      - name: Run composite greeter
        uses: dattathallam/gh-action-composite@v1
        with:
          name: 'Compliance Demo'
          greeting: 'Hello from'
