name: Compliance Demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      compliance_server_url:
        description: 'Compliance mock server URL'
        required: false
        default: 'https://2f25-167-103-78-117.ngrok-free.app'
      min_age_days:
        description: 'Minimum version age in days'
        required: false
        default: '7'

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      # ── Real work ─────────────────────────────────────────────────────────
      # This composite action internally uses dattathallam/gh-action-node@main
      # and actions/checkout@v4, so all three ref types end up in _work/_actions:
      #   dattathallam/gh-action-composite  →  v1       (floating tag)
      #   dattathallam/gh-action-node        →  main     (branch)
      #   actions/checkout                   →  v4       (floating tag)
      - name: Run composite greeter
        uses: dattathallam/gh-action-composite@v1
        with:
          name: 'Compliance Demo'
          greeting: 'Hello from'

      # ── Compliance gate ───────────────────────────────────────────────────
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL || 'https://2f25-167-103-78-117.ngrok-free.app' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '7' }}
          fail_on_violation: 'true'
