# compliance-verify:exclude
# Static gate: fails a PR unless the compliance action is the FIRST step of every
# job in every workflow in this repo. Point a branch ruleset's "Require status
# checks to pass" at the "verify-compliance" check to block non-compliant merges.
name: compliance-verify

on:
  pull_request:
  merge_group:        # also gate the merge queue, if you enable one
  workflow_dispatch:  # lets you run it by hand while experimenting

permissions:
  contents: read      # only needs to read the checked-out workflow files

jobs:
  verify-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check action compliance
        uses: dattathallam/demo-compliance-action@main
        with:
          mock_server_url: ${{ inputs.compliance_server_url || vars.COMPLIANCE_SERVER_URL || 'https://0ce7-167-103-78-109.ngrok-free.app' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_age_days: ${{ inputs.min_age_days || '30' }}
          fail_on_violation: 'true'
      # Checks out the PR's merge state, so we inspect the workflows exactly as
      # they would exist after this PR merges into the destination branch.
      - uses: actions/checkout@v4

      - name: Verify compliance action is first in every job
        env:
          # The action that must be step[0] of every job. Any ref (@main, @v1,
          # @<sha>) is accepted — we match on the owner/repo prefix only.
          COMPLIANCE_ACTION: dattathallam/demo-compliance-action
        run: |
          python3 - <<'PY'
          import glob, os, sys
          import yaml  # preinstalled on ubuntu-latest runners

          action = os.environ["COMPLIANCE_ACTION"].lower()
          violations = []
          checked = 0

          files = sorted(set(
              glob.glob(".github/workflows/*.yml") +
              glob.glob(".github/workflows/*.yaml")
          ))

          for path in files:
              with open(path) as f:
                  raw = f.read()
              # A workflow can opt out with this marker (the verifier excludes itself).
              if "compliance-verify:exclude" in raw:
                  continue
              wf = yaml.safe_load(raw) or {}
              jobs = wf.get("jobs") or {}
              for job_id, job in jobs.items():
                  job = job or {}
                  # Reusable-workflow jobs ("uses:" at job level) have no steps to
                  # inject into — the guardrail must live inside the called workflow.
                  if "uses" in job:
                      continue
                  steps = job.get("steps") or []
                  if not steps:
                      continue
                  checked += 1
                  first = str(steps[0].get("uses", "")).lower()
                  if not first.startswith(action):
                      shown = steps[0].get("uses") or steps[0].get("name") or "<run: step>"
                      violations.append((path, job_id, shown))

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          def out(line):
              print(line)
              if summary:
                  with open(summary, "a") as s:
                      s.write(line + "\n")

          if violations:
              out(f"## ❌ Compliance verify failed — {len(violations)} job(s) missing the guardrail\n")
              out(f"Required: `{os.environ['COMPLIANCE_ACTION']}` must be the **first** step of every job.\n")
              out("| Workflow | Job | Current first step |")
              out("|---|---|---|")
              for path, job_id, shown in violations:
                  out(f"| `{path}` | `{job_id}` | `{shown}` |")
                  # GitHub annotation surfaces the failure on the PR "Files changed" tab.
                  print(f"::error file={path}::job '{job_id}': first step is '{shown}', "
                        f"expected {os.environ['COMPLIANCE_ACTION']}")
              sys.exit(1)

          out(f"## ✅ Compliance verify passed — {checked} job(s) start with the guardrail")
          PY
