name: 'Compliance Gate'
description: 'Resolves third-party actions on the runner to compliant versions (gacpm + curation APIs) and enforces them on disk; fails the workflow if a selected version is rejected.'
inputs:
  github-token:
    description: 'GitHub token used by gacpm/gh to read tags and download zipballs'
    required: false
    default: ${{ github.token }}
  api-base-url:
    description: 'Base URL of the curation mock server (exposes /filterVersions and /curation)'
    required: false
    default: 'https://bc8d-167-103-72-120.ngrok-free.app'
runs:
  using: 'composite'
  steps:
    # Step 1: the runner must already have gacpm (built from gh-action-compliance), gh, jq, curl.
    - name: Preflight tooling
      shell: bash
      run: |
        missing=0
        for tool in gacpm gh jq curl; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "::error::required tool '$tool' not found on PATH"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          echo "Install gacpm on the runner once:" >&2
          echo "  cd /path/to/gh-action-compliance && go build -o gacpm ./cmd/gacpm" >&2
          echo "  sudo cp gacpm /usr/local/bin/gacpm" >&2
          exit 1
        fi
        echo "preflight OK: gacpm, gh, jq, curl present"

    # Step 2: fetch the allow/block list configured in this repo's GitHub Actions settings.
    - name: Fetch GitHub Actions allow list
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        REPO="${GITHUB_REPOSITORY}"
        API="https://api.github.com"

        # Wrapper: retries curl up to 3 times (transient/5xx only) with a 15 s timeout.
        # Prints the response body to stdout and returns 0 on HTTP 200.
        # Returns 1 immediately on 401/403/404 — these are not transient.
        # Sets GH_API_HTTP_CODE so callers can inspect the last status code.
        GH_API_HTTP_CODE=""
        gh_api_get() {
          local url="$1"
          local attempt resp curl_exit
          GH_API_HTTP_CODE=""
          for attempt in 1 2 3; do
            resp=$(curl -s --max-time 15 \
              -w "\n%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$url" 2>/dev/null)
            curl_exit=$?
            if [ "$curl_exit" -ne 0 ]; then
              echo "::warning::curl network error (exit $curl_exit) on attempt $attempt for $url" >&2
              sleep 3; continue
            fi
            GH_API_HTTP_CODE=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [ "$GH_API_HTTP_CODE" = "200" ]; then
              printf '%s' "$body"
              return 0
            fi
            # 401/403/404 will not change on retry — bail immediately.
            case "$GH_API_HTTP_CODE" in
              401|403|404)
                echo "::warning::GitHub API returned HTTP $GH_API_HTTP_CODE for $url (not retrying)" >&2
                return 1 ;;
            esac
            echo "::warning::GitHub API returned HTTP $GH_API_HTTP_CODE on attempt $attempt for $url" >&2
            sleep 3
          done
          return 1
        }

        echo "Fetching Actions permissions for $REPO..."
        if ! perms_resp=$(gh_api_get "$API/repos/$REPO/actions/permissions"); then
          case "$GH_API_HTTP_CODE" in
            403) echo "::warning::Token lacks 'administration: read' permission — add it to your workflow's permissions block. Defaulting allowed_actions to 'all'." ;;
            401) echo "::warning::Token is invalid or expired for GitHub API. Defaulting allowed_actions to 'all'." ;;
            404) echo "::warning::Repo not found or Actions disabled for $REPO. Defaulting allowed_actions to 'all'." ;;
            *)   echo "::warning::Could not reach GitHub API (HTTP ${GH_API_HTTP_CODE:-network error}). Defaulting allowed_actions to 'all'." ;;
          esac
          allowed_actions="all"
        else
          allowed_actions=$(printf '%s' "$perms_resp" | jq -r '.allowed_actions // "all"')
        fi
        echo "allowed_actions policy: $allowed_actions"

        patterns='[]'
        if [ "$allowed_actions" = "selected" ]; then
          if ! selected_resp=$(gh_api_get "$API/repos/$REPO/actions/permissions/selected-actions"); then
            echo "::error::Policy is 'selected' but could not fetch patterns_allowed (HTTP ${GH_API_HTTP_CODE:-network error}). Cannot enforce allow list."
            exit 1
          fi
          patterns=$(printf '%s' "$selected_resp" | jq -c '.patterns_allowed // []')
          echo "allowed patterns: $patterns"
        fi

        # Write to a temp file so the scan step can consume it.
        jq -nc \
          --arg allowed_actions "$allowed_actions" \
          --argjson patterns "$patterns" \
          '{allowed_actions: $allowed_actions, patterns: $patterns}' \
          > "$RUNNER_TEMP/gh_allowed_patterns.json"
        echo "allow list saved to $RUNNER_TEMP/gh_allowed_patterns.json"

    # Step 3: scan _work/_actions, resolve+filter+curate each third-party action, enforce the
    # approved version on disk, and fail the job if anything is non-compliant.
    - name: Scan, gate, and enforce
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        API_BASE: ${{ inputs.api-base-url }}
        SELF_REPO: gh-action-compliance-gate
      run: |
        # GitHub runs composite bash steps with errexit (-e) on. gacpm intentionally
        # returns non-zero for unresolvable refs (e.g. 404 for a dep with no semver tags),
        # so disable errexit and branch on the reported status instead of aborting.
        set -u
        set -o pipefail
        set +e
        FILTER_URL="${API_BASE%/}/filterVersions"
        CURATION_URL="${API_BASE%/}/curation"
        ACTIONS_DIR="$(dirname "$RUNNER_WORKSPACE")/_actions"

        # Load allow list fetched in the previous step.
        allow_list="$RUNNER_TEMP/gh_allowed_patterns.json"
        gh_allowed_actions=$(jq -r '.allowed_actions' "$allow_list")
        gh_patterns=$(jq -c '.patterns' "$allow_list")
        echo "GitHub Actions policy: allowed_actions=$gh_allowed_actions"

        echo "Scanning $ACTIONS_DIR for third-party actions..."
        if [ ! -d "$ACTIONS_DIR" ]; then
          echo "No _actions directory found; nothing to gate."
          exit 0
        fi

        verdicts="$(mktemp)"

        # Process substitution keeps the loop in the current shell (so verdicts persist).
        while IFS= read -r ref_dir; do
          owner=$(basename "$(dirname "$(dirname "$ref_dir")")")
          repo=$(basename "$(dirname "$ref_dir")")
          ref=$(basename "$ref_dir")
          pkg="$owner/$repo"

          # Ignore GitHub-native actions and the gate's own action.
          case "$owner" in
            actions|github) echo "skip native $pkg@$ref"; continue ;;
          esac
          if [ "$repo" = "$SELF_REPO" ]; then
            echo "skip self $pkg@$ref"; continue
          fi

          # --- GitHub Actions allow-list check ---
          # Reject immediately if the repo policy forbids all third-party actions.
          if [ "$gh_allowed_actions" = "local_only" ]; then
            echo "REJECTED $pkg@$ref: GitHub policy allows local actions only"
            echo "REJECTED $pkg@$ref github-policy-local-only" >> "$verdicts"
            continue
          fi
          # When the policy is "selected", verify the action appears in patterns_allowed.
          if [ "$gh_allowed_actions" = "selected" ]; then
            is_allowed=0
            while IFS= read -r pattern; do
              pat_pkg="${pattern%%@*}"
              pat_ref="${pattern#*@}"
              if [ "$pat_pkg" = "$pkg" ] && { [ "$pat_ref" = "*" ] || [ "$pat_ref" = "$ref" ]; }; then
                is_allowed=1
                break
              fi
            done < <(printf '%s' "$gh_patterns" | jq -r '.[]')
            if [ "$is_allowed" -eq 0 ]; then
              echo "REJECTED $pkg@$ref: not in GitHub Actions allow list"
              echo "REJECTED $pkg@$ref github-not-allowed" >> "$verdicts"
              continue
            fi
            echo "allow-list OK: $pkg@$ref"
          fi

          echo "::group::$pkg@$ref"

          # (1) Resolve all versions via the package manager. Retry a few times to
          # ride out transient gh network blips on gacpm's auth call.
          list_json=""
          status=""
          for attempt in 1 2 3; do
            list_json=$(gacpm list "$pkg@$ref" 2>/dev/null)
            status=$(printf '%s' "$list_json" | jq -r '.status // empty' 2>/dev/null)
            [ "$status" = "200" ] && break
            echo "gacpm list attempt $attempt for $pkg@$ref: status=${status:-none}; retrying"
            sleep 2
          done
          if [ "$status" != "200" ]; then
            echo "WARN: gacpm could not resolve $pkg@$ref (status=${status:-none}); skipping"
            printf '%s' "$list_json" | jq -r '.error // empty' 2>/dev/null
            echo "::endgroup::"
            continue
          fi

          # (2) Build [[downloadUrl, version], ...] for the filter API.
          pairs=$(printf '%s' "$list_json" | jq -c '[.versions[] | [.downloadUrl, .version]]')
          echo "candidates: $(printf '%s' "$list_json" | jq -c '[.versions[].version]')"

          # (3) filterVersions -> blocked_versions.
          filter_body=$(jq -nc --arg pkg "$pkg" --argjson versions "$pairs" '{package:$pkg, versions:$versions}')
          filter_resp=$(curl -s -X POST "$FILTER_URL" -H 'Content-Type: application/json' -d "$filter_body")
          blocked=$(printf '%s' "$filter_resp" | jq -c '.blocked_versions // []' 2>/dev/null || echo '[]')
          echo "blocked: $blocked"

          # (4) Remove blocked versions, pick the 0th (latest) remaining.
          picked=$(jq -nc --argjson pairs "$pairs" --argjson blocked "$blocked" \
            '$pairs | map(select(.[1] as $v | ($blocked | index($v)) | not)) | .[0] // empty')
          if [ -z "$picked" ] || [ "$picked" = "null" ]; then
            echo "REJECTED $pkg@$ref: no compliant version after filtering"
            echo "REJECTED $pkg@$ref no-compliant-version" >> "$verdicts"
            echo "::endgroup::"
            continue
          fi
          picked_url=$(printf '%s' "$picked" | jq -r '.[0]')
          picked_ver=$(printf '%s' "$picked" | jq -r '.[1]')
          echo "selected: $picked_ver"

          # (5) curation -> approve (200) or reject (403).
          cur_body=$(jq -nc --arg pkg "$pkg" --arg url "$picked_url" '{package:$pkg, downloadUrl:$url}')
          cur_out="$(mktemp)"
          cur_code=$(curl -s -o "$cur_out" -w "%{http_code}" -X POST "$CURATION_URL" -H 'Content-Type: application/json' -d "$cur_body")
          cur_resp=$(cat "$cur_out"); rm -f "$cur_out"
          if [ "$cur_code" != "200" ]; then
            echo "REJECTED $pkg@$ref: curation $cur_code $cur_resp"
            echo "REJECTED $pkg@$ref curation-$cur_code" >> "$verdicts"
            echo "::endgroup::"
            continue
          fi
          echo "APPROVED $pkg@$ref -> $picked_ver"

          # (6) Enforce: replace the on-disk action with the approved version's contents.
          echo "enforcing $picked_ver into $ref_dir"
          find "$ref_dir" -mindepth 1 -delete
          install_out="$(mktemp)"
          if gacpm install --dest "$ref_dir" "$pkg@$picked_ver" >"$install_out" 2>&1; then
            echo "installed $picked_ver into $ref_dir"
            echo "APPROVED $pkg@$ref $picked_ver" >> "$verdicts"
          else
            echo "ERROR installing $picked_ver:"; cat "$install_out"
            echo "REJECTED $pkg@$ref install-failed" >> "$verdicts"
          fi
          rm -f "$install_out"
          echo "::endgroup::"
        done < <(find "$ACTIONS_DIR" -mindepth 3 -maxdepth 3 -type d)

        echo "=== compliance summary ==="
        cat "$verdicts" 2>/dev/null || true
        if grep -q '^REJECTED' "$verdicts" 2>/dev/null; then
          echo "::error::compliance gate failed — one or more actions are non-compliant"
          exit 1
        fi
        echo "compliance gate passed"
